plugins {
    id 'java'
    id 'application'
}

group = "org.checkers"
version = "0.0.1"

application {
    mainClass = 'com.kiseru.checkers.CheckersApplication'
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'org.projectlombok:lombok:1.18.16'
    annotationProcessor 'org.projectlombok:lombok:1.18.16'
}